name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build
        run: |
          pyinstaller -y `
            --collect-submodules="babel" `
            --add-data="README;." `
            --add-data="*.ttf;." `
            --add-data="settings.ini;." `
            --name="Calendar Generator" `
            --icon="calendar.ico" `
            main.py
      - name: Build one-file
        run: |
          pyinstaller -y --onefile `
            --collect-submodules="babel" `
            --add-data="README;." `
            --add-data="*.ttf;." `
            --add-data="settings.ini;." `
            --name="Calendar Generator" `
            --icon="calendar.ico" `
            main.py
      - name: Upload dist
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/
  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download dist
        uses: actions/download-artifact@v3
        with:
          name: dist
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Calendar generator.exe
            Calendar generator/
